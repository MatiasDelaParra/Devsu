server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: account-service
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${ACCOUNT_DB_URL:jdbc:postgresql://localhost:5434/account_db}
    username: ${ACCOUNT_DB_USERNAME:account_user}
    password: ${ACCOUNT_DB_PASSWORD:account_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: account
  flyway:
    enabled: ${ACCOUNT_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    default-schema: account
    schemas:
      - account
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

account:
  messaging:
    customer-events:
      exchange: ${CUSTOMER_EVENTS_EXCHANGE:customer.events}
      queue: ${ACCOUNT_CUSTOMER_EVENTS_QUEUE:account.customer-events.queue}
      routing-key: ${ACCOUNT_CUSTOMER_EVENTS_ROUTING_KEY:customer.#}
      dead-letter-exchange: ${ACCOUNT_CUSTOMER_EVENTS_DLX:customer.events.dlx}
      dead-letter-queue: ${ACCOUNT_CUSTOMER_EVENTS_DLQ:account.customer-events.dlq}
      dead-letter-routing-key: ${ACCOUNT_CUSTOMER_EVENTS_DLQ_ROUTING_KEY:account.customer-events.dead}
      maximum-attempts: ${ACCOUNT_CUSTOMER_EVENTS_MAXIMUM_ATTEMPTS:3}
      initial-interval: ${ACCOUNT_CUSTOMER_EVENTS_INITIAL_INTERVAL_MS:500}
      multiplier: ${ACCOUNT_CUSTOMER_EVENTS_RETRY_MULTIPLIER:2.0}
      maximum-interval: ${ACCOUNT_CUSTOMER_EVENTS_MAXIMUM_INTERVAL_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
