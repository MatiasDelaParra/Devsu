server:
  port: ${SERVER_PORT:9082}

spring:
  application:
    name: customer-service
  datasource:
    url: ${CUSTOMER_DB_URL:jdbc:postgresql://localhost:5433/customer_db}
    username: ${CUSTOMER_DB_USERNAME:customer_user}
    password: ${CUSTOMER_DB_PASSWORD:customer_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: customer
  flyway:
    enabled: ${CUSTOMER_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    default-schema: customer
    schemas:
      - customer
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

customer:
  messaging:
    exchange: ${CUSTOMER_EVENTS_EXCHANGE:customer.events}
    routing-keys:
      created: ${CUSTOMER_CREATED_ROUTING_KEY:customer.created}
      updated: ${CUSTOMER_UPDATED_ROUTING_KEY:customer.updated}
      status-changed: ${CUSTOMER_STATUS_CHANGED_ROUTING_KEY:customer.status-changed}
      deleted: ${CUSTOMER_DELETED_ROUTING_KEY:customer.deleted}
    publisher:
      batch-size: ${OUTBOX_BATCH_SIZE:50}
      maximum-retries: ${OUTBOX_MAXIMUM_RETRIES:5}
      fixed-delay: ${OUTBOX_FIXED_DELAY_MS:5000}
      initial-delay: ${OUTBOX_INITIAL_DELAY_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
