services:
  customer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: customer-service
    image: devsu/customer-service:local
    environment:
      SERVER_PORT: 8081
      CUSTOMER_DB_URL: jdbc:postgresql://customer-postgres:5432/customer_db
      CUSTOMER_DB_USERNAME: customer_user
      CUSTOMER_DB_PASSWORD: customer_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "${CUSTOMER_SERVICE_PORT:-8081}:8081"
    depends_on:
      customer-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: account-service
    image: devsu/account-service:local
    environment:
      SERVER_PORT: 8082
      ACCOUNT_DB_URL: jdbc:postgresql://account-postgres:5432/account_db
      ACCOUNT_DB_USERNAME: account_user
      ACCOUNT_DB_PASSWORD: account_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "${ACCOUNT_SERVICE_PORT:-8082}:8082"
    depends_on:
      account-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  customer-postgres:
    image: postgres:16-alpine
    container_name: customer-postgres
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: customer_password
    ports:
      - "5433:5432"
    volumes:
      - customer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_user -d customer_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  account-postgres:
    image: postgres:16-alpine
    container_name: account-postgres
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
    ports:
      - "5434:5432"
    volumes:
      - account-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user -d account_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: banking-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  customer-postgres-data:
  account-postgres-data:
